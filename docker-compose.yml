version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-dev-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_dev_team
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_dev_team"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-dev-network

  redis:
    image: redis:7-alpine
    container_name: ai-dev-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-dev-network

  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: ai-dev-chromadb
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma-data
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - ai-dev-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: ai-dev-api
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ai_dev_team
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./generated_projects:/app/generated_projects
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug"
    restart: unless-stopped
    networks:
      - ai-dev-network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: ai-dev-worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ai_dev_team
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./backend:/app
      - ./generated_projects:/app/generated_projects
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped
    networks:
      - ai-dev-network

volumes:
  postgres_data:
  chroma_data:

networks:
  ai-dev-network:
    driver: bridge
