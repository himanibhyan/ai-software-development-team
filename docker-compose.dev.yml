version: "3.9"

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  chromadb:
    ports:
      - "8001:8000"

  api:
    build:
      target: development
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      LOG_FORMAT: console
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  worker:
    build:
      target: development
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      LOG_FORMAT: console
    volumes:
      - ./backend:/app

  frontend:
    build:
      dockerfile: Dockerfile
    ports:
      - "80:80"
