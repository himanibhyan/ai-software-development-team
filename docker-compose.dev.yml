version: "3.9"

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  chromadb:
    ports:
      - "8001:8000"

  api:
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - LOG_FORMAT=console

  worker:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - LOG_FORMAT=console

  # Local development only: run API outside Docker
  # Use: docker compose -f docker-compose.yml -f docker-compose.dev.yml up postgres redis chromadb
