version: "3.9"

# ────────────────────────────────────────────────────────────────
# Docker Secrets overlay — replaces .env file secrets with
# Docker-managed secrets mounted at /run/secrets/<name>.
#
# Usage:
#   echo "sk-..." > secrets/openai_api_key
#   echo "prod-secret-key-..." > secrets/secret_key
#   echo "prod-api-key-..." > secrets/api_key
#   docker compose -f docker-compose.yml -f docker-compose.secrets.yml up -d
#
# Requires Docker Swarm (docker stack deploy) for full secret
# encryption at rest, but also works with docker compose.
# ────────────────────────────────────────────────────────────────

secrets:
  openai_api_key:
    file: ./secrets/openai_api_key
  secret_key:
    file: ./secrets/secret_key
  api_key:
    file: ./secrets/api_key

services:
  api:
    secrets:
      - openai_api_key
      - secret_key
      - api_key
    environment:
      # Must still be set (can be empty) so pydantic-settings loads
      # the model; the real values come from /run/secrets/ via
      # config.py's model_post_init hook.
      OPENAI_API_KEY: ""
      SECRET_KEY: ""
      API_KEY: ""

  worker:
    secrets:
      - openai_api_key
      - secret_key
      - api_key
    environment:
      OPENAI_API_KEY: ""
      SECRET_KEY: ""
      API_KEY: ""
